---
layout: default
---

<style>
	article img {
		max-width: 100%;
		height: auto;
		border-radius: 8px;
		margin: 20px 0;
		box-shadow: 0 2px 8px rgba(0,0,0,0.1);
	}
	
	article figure {
		margin: 30px 0;
		text-align: center;
	}
	
	article figcaption {
		font-style: italic;
		color: #666;
		font-size: 14px;
		margin-top: 10px;
		line-height: 1.5;
	}
	
	article p {
		margin-bottom: 16px;
		line-height: 1.6;
	}
	
	article h2 {
		margin-top: 30px;
		margin-bottom: 16px;
	}
	
	article h3 {
		margin-top: 24px;
		margin-bottom: 12px;
	}
	
	article ul, article ol {
		margin-bottom: 16px;
	}
	
	article li {
		margin-bottom: 8px;
		line-height: 1.5;
	}
</style>

<article>

	<div class="center">
		<h1 class="title">{{ page.title }}</h1>
		<time class="code">{{ page.date | date: '%B %-d, %Y' }}</time>
	</div>

	<div class="divider"></div>

	{{ content }}

</article>

<div class="page-navigation code">
	{% if page.next.url %}
    <a class="next" href="{{ page.next.url | prepend: site.baseurl | prepend: site.url }}" title="NEXT: {{page.next.title}}"><<</a>
		<span> &middot; </span>
  {% endif %}
		<a class="home" href="{{ "/" | prepend: site.baseurl | prepend: site.url }}" title="Back to Index">Index</a>
  {% if page.previous.url %}
		<span> &middot; </span>
    <a class="prev" href="{{ page.previous.url | prepend: site.baseurl | prepend: site.url }}" title="PREV: {{page.previous.title}}">>></a>
  {% endif %}
</div>
