# Site Info
title:              "Suraiya Ahmed - Finance & HR Professional"
description:        "Portfolio of Suraiya Ahmed - Finance Operations Manager, HR Specialist, and Finance Professional based in Dhaka, Bangladesh"
author_name:        "Suraiya Ahmed" # change this to your name
logo_url:           /img/projects/suraiya.JPG # Profile photo

# Site Settings
url:                https://sATmed99.github.io # GitHub Pages URL
baseurl:            /portfolio # IMPORTANT: Must match GitHub Pages deployment path
permalink:          /:title # Post permalink
timezone:           America/Recife # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
mathjax:            true  # enables support for mathjax - set to 'false' to disable

# Site Build
highlighter:        rouge
markdown:           kramdown
kramdown:
    input:          GFM
sass:
    style:          :compressed

# Other Params
include:            [ "robots.txt" ]
exclude:            [ "LICENSE", "README.md", "CNAME", "vendor", "Gemfile", "script" ]
plugins:
  - jekyll-sitemap
collections:
  researches:
    output: true
    permalink: /researches/:name
  projects:
    output: true
    permalink: /projects/:name
  talks:
    output: true
    permalink: /talks/:name
  blog:
    output: true
    permalink: /blog/:name

defaults:
  -
    scope:
      path:         ""
    values:
      layout:       "null"
  -
    scope:
      type:         "pages"
    values:
      layout:       "page"
  -
    scope:
      type:         "posts"
    values:
      layout:       "post"
  -
    scope:
      type:         "researches"
    values:
      layout:       "research-post"
  -
    scope:
      type:         "projects"
    values:
      layout:       "post"
  -
    scope:
      type:         "talks"
    values:
      layout:       "post"
  -
    scope:
      type:         "blog"
    values:
      layout:       "post"
